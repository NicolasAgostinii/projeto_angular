<div class="card">
  <div class="card-imagem-wrapper" (click)="verDetalhes()">
    <img
      [src]="publicacao.imagem"
      [alt]="publicacao.titulo"
      class="card-imagem"
      onerror="this.src='https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=400&h=500&fit=crop'"
    />
    <span class="categoria-badge" *ngIf="publicacao.categoria">
      {{ publicacao.categoria }}
    </span>
  </div>

  <div class="card-conteudo">
    <h3 class="card-titulo" (click)="verDetalhes()">{{ publicacao.titulo }}</h3>

    <p class="card-descricao" [class.expandida]="descricaoExpandida">
      {{ publicacao.descricao }}
    </p>

    <button
      class="btn-ver-mais"
      (click)="toggleDescricao()"
      *ngIf="publicacao.descricao.length > 80"
    >
      {{ descricaoExpandida ? 'Ver menos' : 'Ver mais' }}
    </button>

    <div class="card-acoes">
      <button class="btn-editar" (click)="editarPublicacao()">
        ✏️ Editar
      </button>
      <button class="btn-excluir" (click)="excluirPublicacao()">
        🗑️ Excluir
      </button>
    </div>
  </div>
</div>
